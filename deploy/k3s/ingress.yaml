apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oto
  namespace: oto
  labels:
    app.kubernetes.io/name: oto
    app.kubernetes.io/component: server
  annotations:
    # cert-manager: uncomment and set issuer name to enable automatic TLS
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - oto.example.com
      secretName: oto-tls
  rules:
    - host: oto.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oto
                port:
                  number: 8080
