apiVersion: apps/v1
kind: Deployment
metadata:
  name: oto
  namespace: oto
  labels:
    app.kubernetes.io/name: oto
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oto
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oto
        app.kubernetes.io/component: server
    spec:
      initContainers:
        - name: migrate
          image: oto:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: oto-config
            - secretRef:
                name: oto-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      containers:
        - name: oto
          image: oto:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: oto-config
            - secretRef:
                name: oto-secret
          volumeMounts:
            - name: user-data
              mountPath: /var/lib/oto/user-data
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: user-data
          persistentVolumeClaim:
            claimName: oto-user-data
