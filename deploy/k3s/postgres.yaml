apiVersion: v1
kind: Service
metadata:
  name: oto-db
  namespace: oto
  labels:
    app.kubernetes.io/name: oto
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app.kubernetes.io/name: oto
    app.kubernetes.io/component: database
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: oto-db
  namespace: oto
  labels:
    app.kubernetes.io/name: oto
    app.kubernetes.io/component: database
spec:
  serviceName: oto-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oto
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oto
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "oto"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oto-secret
                  key: ADMIN_API_KEY
            - name: POSTGRES_DB
              value: "oto"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - oto
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - oto
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: oto-db-data
