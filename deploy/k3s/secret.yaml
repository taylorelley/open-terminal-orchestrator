apiVersion: v1
kind: Secret
metadata:
  name: shellguard-secret
  namespace: shellguard
  labels:
    app.kubernetes.io/name: shellguard
    app.kubernetes.io/component: secret
type: Opaque
data:
  # Base64-encoded values required. Generate with:
  #   echo -n 'your-value' | base64
  #
  # DATABASE_URL: postgresql://shellguard:<password>@shellguard-db:5432/shellguard
  DATABASE_URL: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  # ADMIN_API_KEY: your admin API key
  ADMIN_API_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  # OPEN_WEBUI_API_KEY: your Open WebUI API key
  OPEN_WEBUI_API_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"
