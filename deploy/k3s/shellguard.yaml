apiVersion: apps/v1
kind: Deployment
metadata:
  name: shellguard
  namespace: shellguard
  labels:
    app.kubernetes.io/name: shellguard
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shellguard
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shellguard
        app.kubernetes.io/component: server
    spec:
      initContainers:
        - name: migrate
          image: shellguard:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: shellguard-config
            - secretRef:
                name: shellguard-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      containers:
        - name: shellguard
          image: shellguard:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: shellguard-config
            - secretRef:
                name: shellguard-secret
          volumeMounts:
            - name: user-data
              mountPath: /var/lib/shellguard/user-data
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: user-data
          persistentVolumeClaim:
            claimName: shellguard-user-data
